<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>小一專注力航行者</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      touch-action: none;
      font-family: sans-serif;
      user-select: none;
      background: linear-gradient(to bottom, #1e1b4b, #0f172a);
      color: white;
    }
    
    @keyframes warp {
      0% { transform: translateY(-100vh); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }
    @keyframes damageBlink {
      0% { opacity: 1; filter: drop-shadow(0 0 10px rgba(239,68,68,1)); }
      100% { opacity: 0.3; filter: drop-shadow(0 0 20px rgba(239,68,68,1)); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    
    .animate-spin-15 { animation: spin 15s linear infinite; }
    .animate-spin-20-reverse { animation: spin-reverse 20s linear infinite; }
    .engine-flicker { transform-origin: 50% 100%; animation: blink 0.1s infinite alternate; }
    @keyframes blink { from { opacity: 0.8; transform: scaleY(0.9); } to { opacity: 1; transform: scaleY(1.1); } }
    
    .floating-text {
      position: absolute;
      z-index: 50;
      font-weight: 900;
      pointer-events: none;
      transition: transform 1.5s ease-out, opacity 1.5s ease-out;
      transform: translate(-50%, -50%);
    }
    .explosion-particle {
      position: absolute;
      border-radius: 50%;
      transform-origin: center;
      mix-blend-mode: screen;
      transition: transform 0.8s ease-out, opacity 0.8s ease-out;
    }
  </style>
</head>
<body class="relative w-full h-screen font-sans flex flex-col">

<!-- Warp Speed Background -->
<div id="warp-bg" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>

<!-- Damage Flash -->
<div id="damage-flash" class="absolute inset-0 bg-red-600/60 z-50 pointer-events-none opacity-0 transition-opacity duration-300"></div>

<!-- Start Screen -->
<div id="start-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-indigo-950/95 backdrop-blur-sm transition-opacity duration-500">
  <h1 class="text-4xl md:text-5xl font-bold mb-4 font-mono text-lime-300 text-center px-4">小一專注力航行者</h1>
  <p class="text-xl md:text-2xl text-slate-300 mb-8 max-w-md text-center">
    請讓裝置保持水平<br>
    <span class="text-sm text-slate-400 mt-2 block">(電腦用戶可使用方向鍵操作)</span>
  </p>
  <button id="start-btn" class="px-8 py-5 bg-fuchsia-500 hover:bg-fuchsia-400 active:scale-95 transition-all text-white text-2xl md:text-3xl font-bold rounded-full shadow-[0_0_20px_rgba(217,70,239,0.5)] cursor-pointer">
    🚀 點擊開始航行
  </button>
</div>

<!-- Game Over Screen -->
<div id="game-over-screen" class="absolute inset-0 z-50 flex-col items-center justify-center bg-red-950/95 backdrop-blur-sm transition-opacity duration-500 hidden">
  <h1 class="text-5xl md:text-7xl font-bold mb-4 font-mono text-red-500 text-center px-4">GAME OVER</h1>
  <p class="text-2xl md:text-3xl text-white mb-8 text-center" id="final-score-ui">最終得分: 0</p>
  <button id="restart-game-btn" class="px-8 py-5 bg-red-600 hover:bg-red-500 active:scale-95 transition-all text-white text-2xl md:text-3xl font-bold rounded-full shadow-[0_0_20px_rgba(220,38,38,0.5)] cursor-pointer">
    🔄 重新開始
  </button>
</div>

<!-- Main Game UI -->
<div id="game-ui" class="absolute inset-0 z-10 pointer-events-none flex-col hidden">
  <div class="flex justify-between items-start px-4 md:px-8 pt-8 w-full pointer-events-auto">
    <div class="bg-slate-900/80 border-2 border-lime-400 px-6 py-2 rounded-xl backdrop-blur-md shadow-[0_0_15px_rgba(163,230,53,0.3)] flex items-center space-x-4 pointer-events-none">
      <div class="text-center">

        <div id="level-ui" class="text-2xl font-black text-white text-center tabular-nums">Level 1</div>
      </div>
      <div class="w-px h-10 bg-lime-400/30"></div>
      <div class="text-center">

    </div>

  <div id="lives-ui" class="absolute top-28 left-4 md:left-8 z-40 flex flex-col space-y-1 md:space-y-2 pointer-events-none w-6 md:w-8">
  </div>
  
  <div id="target-left" class="absolute w-[70px] md:w-[100px] flex flex-col justify-center items-center pointer-events-none transform -translate-x-1/2 -translate-y-1/2">
    <div class="relative w-full aspect-square flex items-center justify-center pointer-events-none">
      <div id="tl-ring1" class="absolute inset-0 border-[4px] border-dashed rounded-full animate-spin-15"></div>
      <div id="tl-ring2" class="absolute inset-1.5 border-2 rounded-full animate-spin-20-reverse opacity-50"></div>
      <div id="tl-bg" class="relative z-10 w-11 h-11 md:w-14 md:h-14 bg-slate-900 border-2 md:border-4 rounded-full flex flex-col items-center justify-center shadow-lg">

    <div class="relative w-full aspect-square flex items-center justify-center pointer-events-none">
      <div id="tr-ring1" class="absolute inset-0 border-[4px] border-dashed rounded-full animate-spin-15"></div>
      <div id="tr-ring2" class="absolute inset-1.5 border-2 rounded-full animate-spin-20-reverse opacity-50"></div>
      <div id="tr-bg" class="relative z-10 w-11 h-11 md:w-14 md:h-14 bg-slate-900 border-2 md:border-4 rounded-full flex flex-col items-center justify-center shadow-lg">
        <span id="tr-text" class="text-xl md:text-2xl font-black text-white"></span>

  <div id="obstacles-layer" class="absolute inset-0 z-10 pointer-events-none overflow-hidden"></div>
  <div id="effects-layer" class="absolute inset-0 z-50 pointer-events-none overflow-hidden"></div>

  <div id="spaceship-container" class="absolute w-[125px] h-[166px] md:w-[166px] md:h-[208px] z-20 pointer-events-none origin-center" style="transform: translate(-50%, -50%);">
    <svg viewBox="0 0 100 120" class="w-full h-full xl:drop-shadow-2xl overflow-visible">

        <ellipse cx="50" cy="115" rx="8" ry="15" fill="#facc15" />
        <ellipse cx="50" cy="115" rx="4" ry="25" fill="#ef4444" opacity="0.8" />
      </g>
      <path d="M 30 70 L 10 110 L 30 100 Z" fill="#ef4444" />
      <path d="M 70 70 L 90 110 L 70 100 Z" fill="#ef4444" />
      <rect x="30" y="30" width="40" height="70" rx="20" fill="#e2e8f0" />
      <path d="M 30 40 Q 50 -10 70 40 Z" fill="#cbd5e1" />
      <circle cx="50" cy="55" r="16" fill="#cffafe" stroke="#475569" stroke-width="4" />

    ( ⬅️ ➡️ ⬆️ ⬇️ )
  </div>
</div>

<script>
const radicalsData = [
  { radical: '木', hex: '#f97316' }, { radical: '水', hex: '#06b6d4' }, { radical: '火', hex: '#ef4444' }, { radical: '人', hex: '#eab308' },
  { radical: '手', hex: '#a855f7' }, { radical: '口', hex: '#22c55e' }, { radical: '草', hex: '#4ade80' }, { radical: '女', hex: '#ec4899' },
  { radical: '辵', hex: '#8b5cf6' }, { radical: '月', hex: '#f43f5e' }, { radical: '言', hex: '#3b82f6' }, { radical: '日', hex: '#facc15' },
];

const wordsMap = {
  '木': "木 校 林 森 枝 板 杯 桶 椅 桌 梅 桃 柳 根 樹 橋 村 材 杆 枯 植 棉 棋 棍".split(' '),
  '水': "水 河 海 洗 江 流 浪 汗 淚 池 洋 活 消 涼 深 清 滿 演 滾 渴 游 漁 漢 波".split(' '),
  '口': "口 吃 喝 唱 叫 吹 吐 吸 呼 哈 嘛 呢 哇 哪 叮 咚 吧 味 吵 嘴 喊 哭".split(' '),
  '手': "打 拍 拉 推 接 捉 拿 找 把 提 排 掉 掃 掛 搬 搖 擦 拾 挑 抬 按 指".split(' '),
  '火': "火 炒 烤 燒 燈 煙 炮 爐 爆 爛 灰 災 炎 炭 烈 烏 焦 然 照 熊 熟 熱 點 煮".split(' '),
  '人': "人 你 他 們 仔 作 住 位 伴 伯 估 伸 似 但 低 何 休 體 停 健 傘 備 傢 傷".split(' '),
  '草': "草 花 茶 菜 葉 落 苗 苦 芽 蘋 芳 芬 黃 著 蓋 藏 蕉 蓮 藥 藍 萬 英 莫 蘆".split(' '),
  '女': "女 媽 姐 妹 奶 她 好 如 姓 妮 妙 姿 嬌 娘 娃 婆 婚 婦 姑 姨 嬸 妃".split(' '),
  '辵': "進 退 近 遠 逃 過 追 迎 送 速 連 迷 造 透 遊 運 道 達 選 還 邊 遲 遇 遍".split(' '),
  '月': "肉 肚 肌 肝 腸 胃 背 胖 臉 腿 腳 腦 肩 肥 胸 膏 膚 腰 胳 膊 脈 膽 脫 服".split(' '),
  '言': "言 說 話 語 認 識 讀 課 誰 記 許 詩 請 謝 講 計 訴 詞 試 評 譯 誠 誤 論".split(' '),
  '日': "日 早 明 星 春 昨 時 晚 晴 暖 暗 晨 期 景 智 普 最 量 會 暑 暴 曉".split(' ')
};

const wordsBank = Object.entries(wordsMap).flatMap(([radical, words]) => words.map(word => ({ word, radical })));

function generateQuestion() {
  const wordObj = wordsBank[Math.floor(Math.random() * wordsBank.length)];
  const correctRadical = radicalsData.find(r => r.radical === wordObj.radical);
  const wrongOptions = radicalsData.filter(r => r.radical !== correctRadical.radical);
  const wrongRadical = wrongOptions[Math.floor(Math.random() * wrongOptions.length)];
  return {
    word: wordObj.word,
    correctRadical,
    wrongRadical,
    isLeftCorrect: Math.random() > 0.5
  };
}

let isPlaying = false;
let score = 0;
let level = 1;
let lives = 5;
let currentQuestion = generateQuestion();

let shipLeft = 50;
let shipTop = 80;
let tiltAngle = 0;
let vx = 0;
let vy = 0;
const friction = 0.88;
const sensitivity = 0.4;

let t1X = 25, t1Y = 30, t2X = 75, t2Y = 30;
let targetVxL = 0.05, targetVyL = 0.03, targetVxR = -0.04, targetVyR = 0.06;

let currentGamma = 0, currentBeta = 0;
let hasGyro = false;
let baseBeta = null;
let baseGamma = null;
const keysDown = new Set();
let obstacles = [];
let cooldown = 0;
let damageCooldown = 0;

let lastTime = performance.now();

const elStartScreen = document.getElementById('start-screen');
const elGameUI = document.getElementById('game-ui');
const elStartBtn = document.getElementById('start-btn');
const elScore = document.getElementById('score-ui');
const elLevel = document.getElementById('level-ui');
const elTargetLeft = document.getElementById('target-left');
const elTargetRight = document.getElementById('target-right');
const elShip = document.getElementById('spaceship-container');
const elShipWord = document.getElementById('spaceship-word');
const elObstaclesLayer = document.getElementById('obstacles-layer');
const elEffectsLayer = document.getElementById('effects-layer');
const elDamageFlash = document.getElementById('damage-flash');
const warpBg = document.getElementById('warp-bg');
const elLivesUI = document.getElementById('lives-ui');
const elGameOverScreen = document.getElementById('game-over-screen');
const elRestartGameBtn = document.getElementById('restart-game-btn');
const elFinalScore = document.getElementById('final-score-ui');

function updateLivesUI() {
  elLivesUI.innerHTML = '';
  for(let i=0; i<lives; i++) {
    const icon = document.createElement('div');
    icon.innerHTML = `<svg viewBox="0 0 100 120" class="w-full h-auto drop-shadow-md opacity-90"><path d="M 30 70 L 10 110 L 30 100 Z" fill="#ef4444" /><path d="M 70 70 L 90 110 L 70 100 Z" fill="#ef4444" /><rect x="30" y="30" width="40" height="70" rx="20" fill="#e2e8f0" /><path d="M 30 40 Q 50 -10 70 40 Z" fill="#cbd5e1" /><circle cx="50" cy="55" r="16" fill="#cffafe" stroke="#475569" stroke-width="4" /><rect x="40" y="100" width="20" height="10" fill="#475569" /></svg>`;
    elLivesUI.appendChild(icon);
  }
}

function gameOver() {
  isPlaying = false;
  elGameOverScreen.classList.remove('hidden');
  elGameOverScreen.classList.add('flex');
  elFinalScore.textContent = `最終得分: ${score}`;
}

function playAudioWithCurve(type, f1, f2, f3) {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f1, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f2, audioCtx.currentTime + 0.1);
    if(f3) osc.frequency.exponentialRampToValueAtTime(f3, audioCtx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
  } catch(e) {}
}

function playSuccessSound() { playAudioWithCurve('sine', 400, 800, 1200); }
function playFailSound() { playAudioWithCurve('triangle', 300, 150); }
function playWarningBeep() { playAudioWithCurve('sawtooth', 200, 50); }

function playLevelUpSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    [ 400, 500, 600, 800 ].forEach((freq, idx) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + idx * 0.15);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + idx * 0.15 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + idx * 0.15 + 0.4);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime + idx * 0.15);
      osc.stop(audioCtx.currentTime + idx * 0.15 + 0.4);
    });
  } catch(e) {}
}

function triggerLevelUp() {
  playLevelUpSound();
  
  obstacles.forEach(o => { if(elObstaclesLayer.contains(o.el)) elObstaclesLayer.removeChild(o.el); });
  obstacles = [];

  const text = document.createElement('div');
  text.className = 'absolute top-1/2 left-1/2 z-50 text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-lime-300 to-cyan-300 whitespace-nowrap pointer-events-none';
  text.style.filter = 'drop-shadow(0 0 20px rgba(163,230,53,0.8))';
  text.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
  text.style.transform = 'translate(-50%, -50%) scale(0.5)';
  text.style.opacity = '0';
  text.textContent = 'LEVEL UP!';
  
  elEffectsLayer.appendChild(text);
  
  requestAnimationFrame(() => {
    text.style.opacity = '1';
    text.style.transform = 'translate(-50%, -50%) scale(1.2)';
  });
  
  setTimeout(() => {
    text.style.transition = 'all 0.5s ease-in';
    text.style.opacity = '0';
    text.style.transform = 'translate(-50%, -50%) scale(2)';
    setTimeout(() => {
      if(elEffectsLayer.contains(text)) elEffectsLayer.removeChild(text);
    }, 500);
  }, 1500);
}

function initWarpStars() {
  warpBg.innerHTML = '';
  for(let i=0; i<40; i++){
    const d = document.createElement('div');
    d.className = 'absolute w-[2px] bg-gradient-to-b from-transparent via-white to-transparent opacity-80';
    const left = Math.random() * 100;
    const delay = Math.random() * 2;
    const dur = Math.random() * 0.5 + 0.5;
    d.style.left = `${left}%`;
    d.style.height = '40px';
    d.style.animation = `warp ${dur * 3}s linear infinite`;
    d.style.animationDelay = `${delay}s`;
    d.dataset.baseDur = dur;
    warpBg.appendChild(d);
  }
}
initWarpStars();

function updateWarpSpeed() {
  for(let i=0; i<warpBg.children.length; i++){
    const d = warpBg.children[i];
    const dur = parseFloat(d.dataset.baseDur);
    d.style.animationDuration = isPlaying ? `${dur / (1 + (level - 1)*0.2)}s` : `${dur * 3}s`;
  }
}

function updateTargetsUI() {
  const leftTarget = currentQuestion.isLeftCorrect ? currentQuestion.correctRadical : currentQuestion.wrongRadical;
  const rightTarget = currentQuestion.isLeftCorrect ? currentQuestion.wrongRadical : currentQuestion.correctRadical;

  document.getElementById('tl-ring1').style.borderColor = leftTarget.hex;
  document.getElementById('tl-ring2').style.borderColor = leftTarget.hex;
  const tlBg = document.getElementById('tl-bg');
  tlBg.style.borderColor = leftTarget.hex;
  tlBg.style.boxShadow = `0 0 20px ${leftTarget.hex}66`;
  document.getElementById('tl-text').textContent = leftTarget.radical;

  document.getElementById('tr-ring1').style.borderColor = rightTarget.hex;
  document.getElementById('tr-ring2').style.borderColor = rightTarget.hex;
  const trBg = document.getElementById('tr-bg');
  trBg.style.borderColor = rightTarget.hex;
  trBg.style.boxShadow = `0 0 20px ${rightTarget.hex}66`;
  document.getElementById('tr-text').textContent = rightTarget.radical;
  
  elShipWord.textContent = currentQuestion.word;
  elScore.textContent = score;
  elLevel.textContent = `Level ${level}`;
}

function spawnFloatingText(text, x, y, textColor, shadowColor) {
  const div = document.createElement('div');
  div.className = `floating-text text-4xl lg:text-5xl`;
  div.textContent = text;
  div.style.left = `${x}%`;
  div.style.top = `${y}%`;
  div.style.color = textColor;
  div.style.filter = `drop-shadow(0 0 10px ${shadowColor})`;
  elEffectsLayer.appendChild(div);
  
  requestAnimationFrame(() => {
    div.style.transform = 'translate(-50%, -150%) scale(1.5)';
    div.style.opacity = '0';
  });

  setTimeout(() => {
    if(elEffectsLayer.contains(div)) elEffectsLayer.removeChild(div);
  }, 1500);
}

function spawnExplosion(x, y, hexColor) {
  const div = document.createElement('div');
  div.className = 'absolute pointer-events-none z-40';
  div.style.left = `${x}%`;
  div.style.top = `${y}%`;
  
  for(let i=0; i<24; i++) {
    const angle = (i/24) * Math.PI*2 + Math.random()*0.2;
    const dist = Math.random()*150 + 40;
    const size = Math.random()*1 + 0.5;
    
    const p = document.createElement('div');
    p.className = 'explosion-particle w-2 h-2 md:w-3 md:h-3';
    p.style.backgroundColor = hexColor;
    p.style.boxShadow = `0 0 15px ${hexColor}`;
    p.style.transform = `translate(-50%, -50%) scale(${size})`;
    
    requestAnimationFrame(() => {
      p.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(${size*0.2})`;
      p.style.opacity = '0';
    });
    
    div.appendChild(p);
  }
  
  elEffectsLayer.appendChild(div);
  setTimeout(() => {
    if(elEffectsLayer.contains(div)) elEffectsLayer.removeChild(div);
  }, 800);
}

function loop(time) {
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;
  const dtScale = dt / 16;
  
  if (isPlaying) {
    if (cooldown > 0) cooldown -= dt;
    if (damageCooldown > 0) damageCooldown -= dt;

    let targetTilt = 0;
    let accelX = 0;
    let accelY = 0;
    
    if (hasGyro) {
      if (baseBeta === null || baseGamma === null) {
        baseBeta = currentBeta;
        baseGamma = currentGamma;
      }
      
      let dGamma = currentGamma - baseGamma;
      let dBeta = currentBeta - baseBeta;
      
      // 加入「平滑死區(Deadzone)」，小於2度不加速，大於2度才開始線性加速
      const deadzone = 2;
      
      if (Math.abs(dGamma) > deadzone) {
        let activeGamma = dGamma > 0 ? dGamma - deadzone : dGamma + deadzone;
        let bounded = Math.max(-45, Math.min(45, activeGamma));
        // 傾斜角度轉換為「加速度 (accel)」，而不是直接的速度
        accelX = (bounded / 45) * sensitivity * dtScale;
        targetTilt = (bounded / 45) * 30; // 飛船圖示的視覺傾斜
      }
      
      if (Math.abs(dBeta) > deadzone) {
        let activeBeta = dBeta > 0 ? dBeta - deadzone : dBeta + deadzone;
        let bounded = Math.max(-45, Math.min(45, activeBeta));
        accelY = (bounded / 45) * sensitivity * dtScale;
      }
    }
    
    // 鍵盤控制也改為套用「加速度」
    if (keysDown.has('ArrowLeft')) { accelX = -sensitivity * 1.5 * dtScale; targetTilt = -25; }
    if (keysDown.has('ArrowRight')) { accelX = sensitivity * 1.5 * dtScale; targetTilt = 25; }
    if (keysDown.has('ArrowUp')) { accelY = -sensitivity * 1.5 * dtScale; }
    if (keysDown.has('ArrowDown')) { accelY = sensitivity * 1.5 * dtScale; }

    // 【核心物理引擎】：新的速度 = (原本速度 + 加速度) * 摩擦力
    vx = (vx + accelX) * friction;
    vy = (vy + accelY) * friction;

    // 將算好的速度加到飛船的位置上
    shipLeft += vx;
    shipTop += vy;

    // 碰到邊界時的處理（將速度歸零，避免卡在邊界抖動）
    if (shipLeft < 10) { shipLeft = 10; vx = 0; }
    if (shipLeft > 90) { shipLeft = 90; vx = 0; }
    if (shipTop < 15) { shipTop = 15; vy = 0; }
    if (shipTop > 90) { shipTop = 90; vy = 0; }
    
    // 讓飛船視覺上的旋轉更平滑
    tiltAngle += (targetTilt - tiltAngle) * 0.15;
    
    elShip.style.left = `${shipLeft}%`;
    elShip.style.top = `${shipTop}%`;
    elShip.style.transform = `translate(-50%, -50%) rotate(${tiltAngle}deg)`;

    const speedMult = 1 + (level - 1)*0.5;
    t1X += targetVxL * dtScale * speedMult;
    t1Y += targetVyL * dtScale * speedMult;
    if(t1X < 15 || t1X > 45) targetVxL *= -1;
    if(t1Y < 20 || t1Y > 60) targetVyL *= -1;
    elTargetLeft.style.left = `${t1X}%`;
    elTargetLeft.style.top = `${t1Y}%`;

    t2X += targetVxR * dtScale * speedMult;
    t2Y += targetVyR * dtScale * speedMult;
    if(t2X < 55 || t2X > 85) targetVxR *= -1;
    if(t2Y < 20 || t2Y > 60) targetVyR *= -1;
    elTargetRight.style.left = `${t2X}%`;
    elTargetRight.style.top = `${t2Y}%`;

    const spawnRate = 0.01 + (level * 0.01);
    if(Math.random() < spawnRate) {
      const obs = document.createElement('div');
      obs.className = 'absolute z-10';
      obs.innerHTML = `<svg viewBox="0 0 64 64" class="w-10 h-10 md:w-14 md:h-14"><path d="M 12 24 L 20 10 L 40 8 L 54 20 L 58 40 L 44 56 L 24 58 L 10 46 Z" fill="#57534e" stroke="#78716c" stroke-width="4"/><circle cx="24" cy="24" r="4" fill="#44403c"/><circle cx="40" cy="36" r="6" fill="#44403c"/><circle cx="20" cy="40" r="3" fill="#44403c"/></svg>`;
      obs.style.filter = 'drop-shadow(0 0 10px rgba(239,68,68,0.5))';
      
      const obj = {
        el: obs,
        x: Math.random()*80 + 10,
        y: -10,
        speed: Math.random()*0.6 + 0.4 + level*0.5,
        rotation: Math.random()*360,
        scaleMult: 1 + (level - 1) * 0.05,
        hit: false
      };
      obstacles.push(obj);
      elObstaclesLayer.appendChild(obs);
    }
    
    let didHitOb = false;
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.y += o.speed * dtScale;
      o.rotation += o.speed * 2;
      
      o.el.style.left = `${o.x}%`;
      o.el.style.top = `${o.y}%`;
      o.el.style.transform = `translate(-50%, -50%) rotate(${o.rotation}deg) scale(${o.scaleMult})`;
      
      if(!o.hit) {
        if(Math.hypot((o.x - shipLeft)*0.8, o.y - shipTop) < 4 * o.scaleMult) {
          o.hit = true;
          didHitOb = true;
        }
      }
      
      if(o.y > 120) {
        if(elObstaclesLayer.contains(o.el)) elObstaclesLayer.removeChild(o.el);
        obstacles.splice(i, 1);
      }
    }

    if(didHitOb && damageCooldown <= 0) {
      lives = Math.max(0, lives - 1);
      spawnFloatingText("-1 生命", shipLeft, shipTop - 10, "#ef4444", "rgba(239,68,68,1)");
      playWarningBeep();
      damageCooldown = 1500;
      updateLivesUI();
      
      elDamageFlash.style.opacity = '1';
      setTimeout(()=>elDamageFlash.style.opacity='0', 300);
      elShip.style.animation = 'damageBlink 0.2s infinite alternate';
      setTimeout(()=>elShip.style.animation='none', 1500);
      
      if (lives <= 0) {
        gameOver();
      }
    }

    let hitZone = null;
    if (Math.hypot(t1X - shipLeft, t1Y - shipTop) < 12) hitZone = 'left';
    else if (Math.hypot(t2X - shipLeft, t2Y - shipTop) < 12) hitZone = 'right';

    if (hitZone && cooldown <= 0) {
      const q = currentQuestion;
      const isCorrect = (hitZone === 'left' && q.isLeftCorrect) || (hitZone === 'right' && !q.isLeftCorrect);
      if(isCorrect) {
        score += 100;
        const newLevel = Math.min(5, Math.floor(score/1000)+1);
        if (newLevel > level) {
          level = newLevel;
          triggerLevelUp();
        } else {
          playSuccessSound();
        }
        
        spawnFloatingText("+100", shipLeft, shipTop-10, "#4ade80", "rgba(74,222,128,1)");
        spawnExplosion(shipLeft, shipTop, q.correctRadical.hex);
        
        currentQuestion = generateQuestion();
        cooldown = 1500;
      } else {
        score = Math.max(0, score - 20);
        playFailSound();
        spawnFloatingText("-20", shipLeft, shipTop-10, "#f87171", "rgba(248,113,113,1)");
        
        shipLeft = 50;
        shipTop = 80;
        tiltAngle = 0;
        cooldown = 1000;
      }
      updateTargetsUI();
      updateWarpSpeed();
    }
  }
  requestAnimationFrame(loop);
}

window.addEventListener('deviceorientation', e => {
  if (e.gamma === null || e.beta === null) return;
  if (e.gamma === 0 && e.beta === 0 && e.alpha === 0) return;
  hasGyro = true;
  currentGamma = e.gamma;
  currentBeta = e.beta;
});

function resetGame() {
  shipLeft = 50; shipTop = 80; tiltAngle = 0;
  vx = 0; vy = 0;
  score = 0; level = 1; lives = 5;
  currentQuestion = generateQuestion();
  obstacles.forEach(o => { if(elObstaclesLayer.contains(o.el)) elObstaclesLayer.removeChild(o.el); });
  obstacles = [];
  t1X = 25; t1Y = 30; t2X = 75; t2Y = 30;
  targetVxL = 0.05; targetVyL = 0.03; targetVxR = -0.04; targetVyR = 0.06;
  
  baseBeta = null;
  baseGamma = null;
  
  updateTargetsUI();
  updateWarpSpeed();
  updateLivesUI();
  
  elGameOverScreen.classList.add('hidden');
  elGameOverScreen.classList.remove('flex');
}

const elRestartBtn = document.getElementById('restart-btn');
if(elRestartBtn) {
  elRestartBtn.addEventListener('click', () => {
    resetGame();
  });
}
if(elRestartGameBtn) {
  elRestartGameBtn.addEventListener('click', () => {
    resetGame();
    isPlaying = true;
  });
}
window.addEventListener('keydown', e => keysDown.add(e.key));
window.addEventListener('keyup', e => keysDown.delete(e.key));

elStartBtn.addEventListener('click', async () => {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const p = await DeviceOrientationEvent.requestPermission();
      if(p !== 'granted') alert('未能獲取陀螺儀權限。請允許權限，或使用鍵盤（方向鍵）遊玩。');
    } catch(err) { console.error(err); }
  }
  
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
  } catch(e) {}
  
  resetGame();
  
  elStartScreen.classList.add('hidden');
  elGameUI.classList.remove('hidden');
  elGameUI.classList.add('flex');
  isPlaying = true;
});

updateTargetsUI();
requestAnimationFrame(loop);
</script>
</body>
</html>
